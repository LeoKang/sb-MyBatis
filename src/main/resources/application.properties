spring.application.name=demo
mybatis.mapper-locations=classpath:mapper/**/*.xml

# enable sql init for schema.sql, data.sql
spring.sql.init.mode=always
spring.sql.init.encoding=utf-8

spring.datasource.url=jdbc:h2:tcp://localhost/~/test;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# enable log for MyBatis
logging.level.com.example.demo.mapper.MemberMapper=TRACE
logging.level.com.example.demo.mapper.ArticleMapper=TRACE